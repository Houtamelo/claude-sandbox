# Machine-wide claude-sandbox defaults. Edit via `claude-sandbox cfg`
# (which copies this template into ~/.config/claude-sandbox/config.toml
# for per-machine editing). Per-project .claude-sandbox.toml merges on
# top: scalars override, lists concatenate.

network = "bridge"

# Pass host env vars through so in-container tools auto-discover their
# host equivalents. SSH_AUTH_SOCK + XDG_RUNTIME_DIR are inherited
# unconditionally; the matching [[mount]] entries below provide the
# socket files at the same paths inside the container.
env_passthrough = ["SSH_AUTH_SOCK", "XDG_RUNTIME_DIR"]

# PulseAudio explicit server path — bypasses libpulse's XDG-based
# auto-discovery, which fails inside the container because libpulse
# verifies that XDG_RUNTIME_DIR is owned by the running UID. Without
# `--userns=keep-id` (currently disabled — see src/podman/args.rs)
# the dir appears owned by container UID 0 (host UID 1000 remapped),
# so the check fails. Setting PULSE_SERVER lets libpulse connect to
# the socket directly, skipping the ownership-check path.
[env]
PULSE_SERVER = "unix:$XDG_RUNTIME_DIR/pulse/native"


# ---- Agent / socket forwarding recipes ----
#
# Each `[[mount]]` below is `optional = true`, which means
# claude-sandbox skips it silently when the host path doesn't resolve
# (env var unset, or file/dir not present). Headless hosts without an
# SSH agent / PulseAudio server / etc. won't see parse errors or
# podman-create failures — those recipes just become no-ops.
#
# To disable any of these per-machine, edit your local copy in
# ~/.config/claude-sandbox/config.toml (run `claude-sandbox cfg` and
# accept the "copy editable defaults" prompt to get one).
# Per-project: same field in .claude-sandbox.toml, OR add `[[mount]]`
# entries that shadow these.

# SSH agent + ~/.ssh/ for `git push`, ssh, scp. The socket lives at the
# host's $SSH_AUTH_SOCK; bind-mounting it at the same path inside (the
# env var is also passed through above) means the in-container ssh
# Just Works against the host agent. ~/.ssh/ exposes config,
# known_hosts, public keys, and identity-file fallbacks (read-only —
# container has no business writing to host SSH state).
[[mount]]
host = "$SSH_AUTH_SOCK"
container = "$SSH_AUTH_SOCK"
optional = true

[[mount]]
host = "~/.ssh"
container = "~/.ssh"
ro = true
optional = true

# GPG keyring + agent socket for commit signing / decryption. Modern
# GnuPG (>= 2.1) keeps the agent socket under $XDG_RUNTIME_DIR/gnupg/
# separate from the keyring under ~/.gnupg/ — both must be present for
# the in-container gpg to talk to the host's already-unlocked agent
# (pinentry runs on the host where the user can see it).
[[mount]]
host = "~/.gnupg"
container = "~/.gnupg"
optional = true

[[mount]]
host = "$XDG_RUNTIME_DIR/gnupg"
container = "$XDG_RUNTIME_DIR/gnupg"
optional = true

# PulseAudio socket — for notification sounds (paplay) and audio
# playback. Works against real PulseAudio AND PipeWire's pulse-compat
# layer. Paired with the explicit PULSE_SERVER env var above so
# libpulse connects directly to the socket without going through the
# XDG-based auto-discovery (which checks ownership of XDG_RUNTIME_DIR
# and fails without keep-id).
[[mount]]
host = "$XDG_RUNTIME_DIR/pulse/native"
container = "$XDG_RUNTIME_DIR/pulse/native"
optional = true


# ---- Live host-DNS tracking (uncomment + pick the right host path) ----
#
# Podman snapshots host's `/etc/resolv.conf` into the container at
# `podman start` time. After that the container's view is frozen until
# the next stop+start. That breaks when host DNS flips mid-session
# (Tailscale up/down with "Use Tailscale DNS" enabled; WiFi switch;
# VPN toggle) — container keeps pointing at a resolver it can't reach,
# you see "Could not resolve host: api.anthropic.com" / "ConnectionRefused".
#
# Bind-mounting host's resolv.conf source file into the container makes
# the container's DNS view follow host state live. Read-only — container
# has no business writing to host DNS state.
#
# Pick the entry that matches your distro and uncomment it:
#
#   - openSUSE Tumbleweed (netconfig): /run/netconfig/resolv.conf
#     This is what `/etc/resolv.conf` symlinks to on stock Tumbleweed.
#     CRITICAL on Tumbleweed if you also use Tailscale: tailscaled
#     REPLACES `/etc/resolv.conf` with a regular file pointing at
#     `100.100.100.100` (which the container can't reach via NAT).
#     `/run/netconfig/resolv.conf` is the LAN-DNS file that tailscaled
#     leaves alone, so bind-mounting it sidesteps the Tailscale overlay.
#
#   - systemd-resolved (Ubuntu / Fedora / Arch with default config):
#     /run/systemd/resolve/resolv.conf  (the real upstream — NOT
#     `stub-resolv.conf` which has `127.0.0.53` that doesn't work
#     from inside a container).
#
#   - Plain (Debian without systemd-resolved, Alpine, etc.):
#     /etc/resolv.conf  (no overlay shenanigans — just the real file).
#
# [[mount]]
# host = "/run/netconfig/resolv.conf"
# container = "/etc/resolv.conf"
# ro = true
# optional = true


